<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gran Galería Virtual 3D - Multiplataforma</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
      touch-action: none;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      margin-top: -4px;
      margin-left: -4px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.6);
      pointer-events: none;
      z-index: 10;
    }

    /* Pantalla de inicio */
    #instructions {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 12, 0.9);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      cursor: pointer;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #instructions h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
    }

    #instructions p {
      font-size: 1.1rem;
      color: #ccc;
      max-width: 500px;
      line-height: 1.5;
    }

    /* Tarjeta informativa del cuadro */
    #info-card {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 20, 0.92);
      color: #fff;
      padding: 18px 24px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      max-width: 500px;
      width: 85%;
      display: none;
      z-index: 20;
      backdrop-filter: blur(12px);
      box-sizing: border-box;
    }

    #info-card h2 {
      margin: 0 0 4px 0;
      color: #f39c12;
      font-size: 1.3rem;
    }

    #info-card h4 {
      margin: 0 0 8px 0;
      color: #aaa;
      font-weight: 400;
      font-style: italic;
      font-size: 0.9rem;
    }

    #info-card p {
      margin: 0;
      line-height: 1.4;
      font-size: 0.85rem;
      color: #ddd;
    }

    /* Contenedor del Joystick para móvil */
    #joystick-zone {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 120px;
      height: 120px;
      z-index: 25;
    }
  </style>

  <!-- Three.js y Librería de Joystick Táctil NippleJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>

  <div id="crosshair"></div>

  <div id="instructions">
    <h1>Gran Galería Virtual</h1>
    <p id="controls-hint">Toca aquí para iniciar el recorrido.</p>
  </div>

  <div id="info-card">
    <h2 id="artwork-title">Título de la Obra</h2>
    <h4 id="artist-name">Artista</h4>
    <p id="artwork-desc">Descripción de la obra...</p>
  </div>

  <!-- Zona táctil para el Joystick -->
  <div id="joystick-zone"></div>

  <div id="canvas-container"></div>

  <script>
    // Detección de dispositivo móvil
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    const hintEl = document.getElementById('controls-hint');
    if (isMobile) {
      hintEl.innerHTML = "Toca para entrar.<br><br><b>Controles táctiles:</b><br>• Joystick izquierdo: Desplazarse<br>• Deslizar pantalla: Mirar alrededor";
    } else {
      hintEl.innerHTML = "Haz clic para entrar.<br><br><b>Controles PC:</b><br>• Teclas W, A, S, D: Caminar<br>• Mouse: Mirar alrededor";
    }

    // --- 1. ESCENA Y CÁMARA ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x18171c); // Fondo ligeramente más cálido
    scene.fog = new THREE.FogExp2(0x18171c, 0.015);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.7, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // --- 2. CONTROLES Y SISTEMA DE MOVIMIENTO ---
    const instructions = document.getElementById('instructions');
    let isGameActive = false;
    let moveForward = 0, moveSide = 0;

    if (!isMobile) {
      // --- CONTROLES PC ---
      const controls = new THREE.PointerLockControls(camera, document.body);
      
      instructions.addEventListener('click', () => {
        controls.lock();
      });
      controls.addEventListener('lock', () => {
        instructions.style.display = 'none';
        isGameActive = true;
      });
      controls.addEventListener('unlock', () => {
        instructions.style.display = 'flex';
        isGameActive = false;
      });

      scene.add(controls.getObject());

      let keyW = false, keyS = false, keyA = false, keyD = false;
      document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyW') keyW = true;
        if (e.code === 'KeyS') keyS = true;
        if (e.code === 'KeyA') keyA = true;
        if (e.code === 'KeyD') keyD = true;
        updatePCMovement();
      });
      document.addEventListener('keyup', (e) => {
        if (e.code === 'KeyW') keyW = false;
        if (e.code === 'KeyS') keyS = false;
        if (e.code === 'KeyA') keyA = false;
        if (e.code === 'KeyD') keyD = false;
        updatePCMovement();
      });

      function updatePCMovement() {
        moveForward = (keyW ? 1 : 0) - (keyS ? 1 : 0);
        moveSide = (keyD ? 1 : 0) - (keyA ? 1 : 0);
      }
    } else {
      // --- CONTROLES MÓVIL ---
      instructions.addEventListener('click', () => {
        instructions.style.display = 'none';
        isGameActive = true;
      });

      const manager = nipplejs.create({
        zone: document.getElementById('joystick-zone'),
        mode: 'static',
        position: { left: '60px', bottom: '60px' },
        color: 'white',
        size: 90
      });

      manager.on('move', (evt, data) => {
        if (data.vector) {
          moveForward = data.vector.y;
          moveSide = data.vector.x;
        }
      });

      manager.on('end', () => {
        moveForward = 0;
        moveSide = 0;
      });

      let touchStartX = 0, touchStartY = 0;
      let lon = -90, lat = 0;

      window.addEventListener('touchstart', (e) => {
        if (e.touches[0].clientX < 150 && e.touches[0].clientY > window.innerHeight - 180) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      });

      window.addEventListener('touchmove', (e) => {
        if (!isGameActive) return;
        if (e.touches[0].clientX < 150 && e.touches[0].clientY > window.innerHeight - 180) return;

        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;

        const deltaX = touchX - touchStartX;
        const deltaY = touchY - touchStartY;

        lon += deltaX * 0.25;
        lat -= deltaY * 0.25;
        lat = Math.max(-85, Math.min(85, lat));

        touchStartX = touchX;
        touchStartY = touchY;

        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);

        const target = new THREE.Vector3();
        target.x = camera.position.x + Math.sin(phi) * Math.cos(theta);
        target.y = camera.position.y + Math.cos(phi);
        target.z = camera.position.z + Math.sin(phi) * Math.sin(theta);

        camera.lookAt(target);
      });
    }

    // --- 3. ARQUITECTURA DE LA SALA ---
    const roomWidth = 12;
    const roomLength = 44;

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(roomWidth, roomLength),
      new THREE.MeshStandardMaterial({ color: 0x222225, roughness: 0.3, metalness: 0.1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(roomWidth, roomLength),
      new THREE.MeshStandardMaterial({ color: 0x1f1f24, roughness: 0.9 })
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 5;
    scene.add(ceiling);

    function createWall(w, h, d, x, y, z) {
      const wall = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color: 0x2b2b30, roughness: 0.8 })
      );
      wall.position.set(x, y, z);
      scene.add(wall);
    }

    createWall(roomWidth, 5, 0.2, 0, 2.5, -roomLength / 2);
    createWall(roomWidth, 5, 0.2, 0, 2.5, roomLength / 2);
    createWall(0.2, 5, roomLength, -roomWidth / 2, 2.5, 0);
    createWall(0.2, 5, roomLength, roomWidth / 2, 2.5, 0);

    // --- 4. SISTEMA DE LÁMPARAS EN EL TECHO E ILUMINACIÓN ---
    // Luz ambiental para asegurar visibilidad general en la sala
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    // Rieles metálicos en el techo (dos líneas a lo largo del pasillo)
    const trackGeo = new THREE.BoxGeometry(0.08, 0.08, roomLength - 4);
    const trackMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
    
    const trackLeft = new THREE.Mesh(trackGeo, trackMat);
    trackLeft.position.set(-3, 4.95, 0);
    scene.add(trackLeft);

    const trackRight = new THREE.Mesh(trackGeo, trackMat);
    trackRight.position.set(3, 4.95, 0);
    scene.add(trackRight);

    // Función para crear cada lámpara/foco físico con iluminación
    function createCeilingSpotlight(x, y, z, targetX) {
      const lampGroup = new THREE.Group();
      lampGroup.position.set(x, y, z);

      // Soporte/Cuerpo de la lámpara
      const baseGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.25, 12);
      const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8 });
      const baseMesh = new THREE.Mesh(baseGeo, baseMat);
      lampGroup.add(baseMesh);

      // Lente/Foco emisor (brilla visualmente)
      const bulbGeo = new THREE.SphereGeometry(0.08, 12, 12);
      const bulbMat = new THREE.MeshBasicMaterial({ color: 0xfff3e0 });
      const bulbMesh = new THREE.Mesh(bulbGeo, bulbMat);
      bulbMesh.position.y = -0.1;
      lampGroup.add(bulbMesh);

      // Orientación sutil de la lámpara hacia las paredes
      if (targetX < 0) lampGroup.rotation.z = -0.3;
      if (targetX > 0) lampGroup.rotation.z = 0.3;

      scene.add(lampGroup);

      // Fuente de luz puntual de la lámpara
      const pointLight = new THREE.PointLight(0xfff3e0, 0.75, 12);
      pointLight.position.set(x, y - 0.2, z);
      scene.add(pointLight);
    }

    // Generación consecutiva de lámparas a lo largo de ambos rieles del techo
    const spacing = 3.5; // Distancia entre cada lámpara
    for (let z = -18; z <= 18; z += spacing) {
      // Lámparas lado izquierdo
      createCeilingSpotlight(-3, 4.85, z, -5.8);
      // Lámparas lado derecho
      createCeilingSpotlight(3, 4.85, z, 5.8);
    }

    // --- 5. OBRAS DE ARTE ---
    const paintingsData = [
      { title: "La Noche Estrellada", artist: "Vincent van Gogh (1889)", desc: "Vista desde la ventana de su asilo en Saint-Rémy-de-Provence.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg", pos: { x: -5.8, y: 2.3, z: -15 }, rotY: Math.PI / 2, size: [2.5, 1.8] },
      { title: "La Mona Lisa", artist: "Leonardo da Vinci (1503)", desc: "Retrato célebre por la expresión enigmática y el sfumato.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/800px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg", pos: { x: -5.8, y: 2.3, z: -9 }, rotY: Math.PI / 2, size: [1.6, 2.3] },
      { title: "El Grito", artist: "Edvard Munch (1893)", desc: "Obra emblemática del expresionismo que simboliza la angustia.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73.5_cm%2C_National_Gallery_of_Norway.jpg/800px-Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73.5_cm%2C_National_Gallery_of_Norway.jpg", pos: { x: -5.8, y: 2.3, z: -3 }, rotY: Math.PI / 2, size: [1.7, 2.2] },
      { title: "La Persistencia de la Memoria", artist: "Salvador Dalí (1931)", desc: "Famosa por sus relojes blandos derritiéndose.", image: "https://upload.wikimedia.org/wikipedia/en/d/dd/The_Persistence_of_Memory.jpg", pos: { x: -5.8, y: 2.3, z: 3 }, rotY: Math.PI / 2, size: [2.3, 1.7] },
      { title: "La Gran Ola de Kanagawa", artist: "Katsushika Hokusai (1831)", desc: "Famosa xilografía japonesa que muestra una ola amenazando embarcaciones.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Tsunami_by_hokusai_19th_century.jpg/1280px-Tsunami_by_hokusai_19th_century.jpg", pos: { x: -5.8, y: 2.3, z: 9 }, rotY: Math.PI / 2, size: [2.4, 1.7] },
      { title: "Impresión, Sol Naciente", artist: "Claude Monet (1872)", desc: "Obra que dio nombre al movimiento Impresionista.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Monet_-_Impression%2C_Soleil_levant.jpg/1280px-Monet_-_Impression%2C_Soleil_levant.jpg", pos: { x: -5.8, y: 2.3, z: 15 }, rotY: Math.PI / 2, size: [2.4, 1.8] },
      { title: "La Joven de la Perla", artist: "Johannes Vermeer (1665)", desc: "Destaca por la mirada de la joven y el brillo del pendiente.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/800px-1665_Girl_with_a_Pearl_Earring.jpg", pos: { x: 5.8, y: 2.3, z: -15 }, rotY: -Math.PI / 2, size: [1.7, 2.2] },
      { title: "El Nacimiento de Venus", artist: "Sandro Botticelli (1485)", desc: "Representa a Venus emergiendo del mar sobre una concha.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg/1280px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg", pos: { x: 5.8, y: 2.3, z: -9 }, rotY: -Math.PI / 2, size: [2.6, 1.7] },
      { title: "Las Meninas", artist: "Diego Velázquez (1656)", desc: "Compleja composición barroca que juega con la perspectiva.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Las_Meninas_01.jpg/800px-Las_Meninas_01.jpg", pos: { x: 5.8, y: 2.3, z: -3 }, rotY: -Math.PI / 2, size: [2.0, 2.3] },
      { title: "La Ronda de Noche", artist: "Rembrandt (1642)", desc: "Uso dramático del claroscuro para resaltar el movimiento.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/The_Night_Watch_-_De_Nachtwacht_%281642%29_Rembrandt_van_Rijn.jpg/1280px-The_Night_Watch_-_De_Nachtwacht_%281642%29_Rembrandt_van_Rijn.jpg", pos: { x: 5.8, y: 2.3, z: 3 }, rotY: -Math.PI / 2, size: [2.4, 2.0] },
      { title: "La Creación de Adán", artist: "Miguel Ángel (1512)", desc: "Fresco de la Capilla Sixtina que ilustra el origen de la humanidad.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg/1280px-Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg", pos: { x: 5.8, y: 2.3, z: 9 }, rotY: -Math.PI / 2, size: [2.6, 1.4] },
      { title: "El Beso", artist: "Gustav Klimt (1908)", desc: "Decorada con pan de oro y formas geométricas inspiradas en mosaicos.", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg/800px-The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg", pos: { x: 5.8, y: 2.3, z: 15 }, rotY: -Math.PI / 2, size: [1.8, 2.2] }
    ];

    const textureLoader = new THREE.TextureLoader();
    const paintingsList = [];

    paintingsData.forEach(data => {
      const group = new THREE.Group();
      group.position.set(data.pos.x, data.pos.y, data.pos.z);
      group.rotation.y = data.rotY;

      // Marco
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(data.size[0] + 0.2, data.size[1] + 0.2, 0.08),
        new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.6 })
      );
      group.add(frame);

      // Lienzo
      const canvasMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(data.size[0], data.size[1]),
        new THREE.MeshBasicMaterial({ map: textureLoader.load(data.image) })
      );
      canvasMesh.position.z = 0.05;
      group.add(canvasMesh);

      // Foco puntual directo enfocado en el lienzo
      const spotLight = new THREE.SpotLight(0xfffaee, 1.2, 8, Math.PI / 4, 0.4);
      spotLight.position.set(0, 1.2, 1.8);
      spotLight.target = canvasMesh;
      group.add(spotLight);

      scene.add(group);

      paintingsList.push({
        position: new THREE.Vector3(data.pos.x, data.pos.y, data.pos.z),
        info: data
      });
    });

    // --- 6. DETECCIÓN DE PROXIMIDAD ---
    const infoCard = document.getElementById('info-card');
    const titleEl = document.getElementById('artwork-title');
    const artistEl = document.getElementById('artist-name');
    const descEl = document.getElementById('artwork-desc');

    function checkProximity() {
      const playerPos = camera.position;
      let activePainting = null;

      paintingsList.forEach(item => {
        if (playerPos.distanceTo(item.position) < 4.0) {
          activePainting = item.info;
        }
      });

      if (activePainting) {
        titleEl.textContent = activePainting.title;
        artistEl.textContent = activePainting.artist;
        descEl.textContent = activePainting.desc;
        infoCard.style.display = 'block';
      } else {
        infoCard.style.display = 'none';
      }
    }

    // --- 7. BUCLE DE ANIMACIÓN ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const speed = 4.5 * delta;

      if (isGameActive) {
        if (moveForward !== 0 || moveSide !== 0) {
          const dir = new THREE.Vector3();
          camera.getWorldDirection(dir);
          dir.y = 0;
          dir.normalize();

          const sideDir = new THREE.Vector3().crossVectors(camera.up, dir).negate();

          camera.position.addScaledVector(dir, moveForward * speed);
          camera.position.addScaledVector(sideDir, moveSide * speed);
        }

        // Colisiones con paredes
        camera.position.y = 1.7;
        if (camera.position.x < -4.8) camera.position.x = -4.8;
        if (camera.position.x > 4.8) camera.position.x = 4.8;
        if (camera.position.z < -20) camera.position.z = -20;
        if (camera.position.z > 20) camera.position.z = 20;

        checkProximity();
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
